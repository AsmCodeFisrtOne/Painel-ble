  :root{
    --bg:            #101215;
    --panel:         #1A1D21;
    --face:          #F7F6F2;
    --tick:          #1A1A1C;
    --green:         #3C8A46;
    --yellow:        #E7B93C;
    --red:           #C23B22;
    --needle:        #1A1A1C;
    --needle-edge:   #F7F6F2;
    --hub:           #1A1A1C;
    --hub-ring:      #B7B4AC;
    --accent:        #3FA7A0;
    --text-dim:      #8A8F98;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow-x:hidden;
    overscroll-behavior:none;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px calc(10px + env(safe-area-inset-top)) 18px;
    padding-top: max(14px, env(safe-area-inset-top));
    background:var(--panel);
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .brand{ color:#EDE8DE; font-weight:700; font-size:15px; letter-spacing:0.5px; }
  .brand small{ display:block; font-weight:400; color:var(--text-dim); font-size:11px; margin-top:2px; }
  .status-pill{
    display:flex; align-items:center; gap:6px;
    font-size:12px; font-weight:600; color:var(--text-dim);
    padding:6px 12px; border-radius:20px; background:rgba(255,255,255,0.05);
  }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--text-dim); transition:background .3s; }
  .dot.live{ background:var(--green); box-shadow:0 0 6px var(--green); }
  .dot.wait{ background:var(--yellow); animation:pulse 1.2s infinite; }
  .dot.off{ background:var(--red); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }

  .connect-btn{
    background:var(--accent); color:#0d1210; border:none;
    font-weight:700; font-size:13px; padding:9px 16px; border-radius:10px;
    cursor:pointer;
  }
  .connect-btn.disconnect{ background:transparent; color:var(--red); border:1px solid var(--red); }
  .connect-btn:active{ transform:scale(0.97); }

  .gauges{
    display:flex; flex-wrap:wrap; justify-content:center; gap:36px;
    padding:36px 24px 48px 24px;
    max-width:1400px;
    margin:0 auto;
  }
  .gauge-card{
    width:clamp(320px, 34vw, 560px);
  }
  canvas{ width:100%; height:auto; display:block; }

  .footer-note{
    text-align:center; color:var(--text-dim); font-size:13px;
    padding:0 20px 28px; line-height:1.6;
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">Painel BLE<small>Pressão &amp; Vazão</small></div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="status-pill"><span class="dot wait" id="statusDot"></span><span id="statusText">Iniciando</span></div>
      <button class="connect-btn" id="connectBtn">Conectar</button>
    </div>
  </div>

  <div class="gauges">
    <div class="gauge-card"><canvas id="gaugePressao" width="720" height="720"></canvas></div>
    <div class="gauge-card"><canvas id="gaugeVazao" width="720" height="720"></canvas></div>
  </div>

  <div class="footer-note">
    Toque em <strong>Conectar</strong> para parear via Bluetooth com o dispositivo.<br>
    Requer Chrome no Android e conexão HTTPS.
  </div>

<script>
/* ============ CONFIG BLE (ajustar para bater com o firmware do ESP32) ============ */
const SERVICE_UUID = 'a55d1a00-1000-4000-8000-00805f9b34fb';
const CHAR_UUID    = 'a55d1a01-1000-4000-8000-00805f9b34fb';
/* payload esperado na characteristic (8 bytes, little-endian):
   bytes 0-3 -> float32 pressao (mmHg)
   bytes 4-7 -> float32 vazao   (L/min)              */

/* ============ CONFIG DOS GAUGES ============ */
const GAUGE_CONFIGS = {
  pressao: {
    min:0, max:100, majorStep:10, minorStep:0.5, unit:'mmHg', label:'PRESSÃO',
    zones:[[0,30,'var(--green)'],[30,60,'var(--yellow)'],[60,100,'var(--red)']]
  },
  vazao: {
    min:0, max:50, majorStep:5, minorStep:1, unit:'L/min', label:'VAZÃO',
    zones:[[0,40,'var(--green)'],[40,45,'var(--yellow)'],[45,50,'var(--red)']]
  }
};

const cssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name.replace('var(','').replace(')','')).trim();
function resolveColor(c){ return c.startsWith('var(') ? cssVar(c) : c; }

const START_DEG = 135, SWEEP_DEG = 270;
function valueToAngleRad(v, cfg){
  const frac = Math.max(0, Math.min(1, (v - cfg.min) / (cfg.max - cfg.min)));
  return (START_DEG + frac * SWEEP_DEG) * Math.PI/180;
}

class Gauge{
  constructor(canvas, cfg){
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.cfg = cfg;
    this.size = canvas.width;
    this.display = cfg.min;   // valor mostrado (suavizado)
    this.target  = cfg.min;   // valor alvo (vindo do BLE)
    this.mode = 'startup';    // 'startup' | 'idle' | 'live'
    this.startTime = null;
  }

  draw(value, statusLabel){
    const ctx = this.ctx, S = this.size, cx = S/2, cy = S/2, cfg = this.cfg;
    ctx.clearRect(0,0,S,S);

    // bezel duplo (aro externo + anel fino, como na referência) + face
    ctx.beginPath(); ctx.arc(cx,cy,S*0.485,0,7); ctx.fillStyle = cssVar('--panel'); ctx.fill();
    ctx.beginPath(); ctx.arc(cx,cy,S*0.465,0,7); ctx.fillStyle = cssVar('--face'); ctx.fill();
    ctx.lineWidth = S*0.004; ctx.strokeStyle = cssVar('--tick');
    ctx.beginPath(); ctx.arc(cx,cy,S*0.465,0,7); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,S*0.44,0,7); ctx.stroke();

    // zonas coloridas
    const rOuter = S*0.43, rInner = S*0.38;
    cfg.zones.forEach(([a,b,color])=>{
      const a0 = valueToAngleRad(a,cfg), a1 = valueToAngleRad(b,cfg);
      ctx.beginPath();
      ctx.arc(cx,cy,rOuter,a0,a1,false);
      ctx.arc(cx,cy,rInner,a1,a0,true);
      ctx.closePath();
      ctx.fillStyle = resolveColor(color);
      ctx.fill();
    });

    // ticks
    const tickColor = cssVar('--tick');
    const nMinor = Math.round((cfg.max-cfg.min)/cfg.minorStep);
    for(let i=0;i<=nMinor;i++){
      const vv = cfg.min + i*cfg.minorStep;
      const ang = valueToAngleRad(vv,cfg);
      const isMajor = Math.abs(vv/cfg.majorStep - Math.round(vv/cfg.majorStep)) < 1e-6;
      const r1 = S*0.38, r0 = isMajor ? S*0.335 : S*0.36;
      const lw = isMajor ? S*0.006 : S*0.0022;
      ctx.beginPath();
      ctx.moveTo(cx + r0*Math.cos(ang), cy + r0*Math.sin(ang));
      ctx.lineTo(cx + r1*Math.cos(ang), cy + r1*Math.sin(ang));
      ctx.strokeStyle = tickColor; ctx.lineWidth = lw; ctx.stroke();
    }

    // labels maiores
    ctx.fillStyle = tickColor;
    ctx.font = `bold ${Math.round(S*0.042)}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const nMajor = Math.round((cfg.max-cfg.min)/cfg.majorStep);
    for(let i=0;i<=nMajor;i++){
      const vv = cfg.min + i*cfg.majorStep;
      const ang = valueToAngleRad(vv,cfg);
      const r = S*0.275;
      ctx.fillText(String(vv), cx + r*Math.cos(ang), cy + r*Math.sin(ang));
    }

    // titulo + unidade
    ctx.font = `600 ${Math.round(S*0.032)}px monospace`;
    ctx.fillStyle = tickColor; ctx.globalAlpha=0.75;
    ctx.fillText(cfg.unit, cx, cy - S*0.14);
    ctx.globalAlpha=1;
    ctx.font = `800 ${Math.round(S*0.05)}px sans-serif`;
    ctx.fillText(cfg.label, cx, cy + S*0.365);

    // status label (aguardando / ao vivo)
    ctx.font = `600 ${Math.round(S*0.024)}px monospace`;
    ctx.fillStyle = cssVar('--text-dim');
    ctx.fillText(statusLabel, cx, cy - S*0.20);

    // ponteiro (cauda curta, para nunca alcançar o display digital abaixo do centro)
    const ang = valueToAngleRad(value,cfg);
    const tipR = S*0.41, tailR = S*0.06, halfW = S*0.022;
    const perp = ang + Math.PI/2;
    const tipX = cx + tipR*Math.cos(ang), tipY = cy + tipR*Math.sin(ang);
    const tailX = cx - tailR*Math.cos(ang), tailY = cy - tailR*Math.sin(ang);
    const lx = tailX + halfW*Math.cos(perp), ly = tailY + halfW*Math.sin(perp);
    const rx = tailX - halfW*Math.cos(perp), ry = tailY - halfW*Math.sin(perp);
    ctx.beginPath();
    ctx.moveTo(tipX,tipY); ctx.lineTo(lx,ly); ctx.lineTo(rx,ry); ctx.closePath();
    ctx.fillStyle = cssVar('--needle'); ctx.fill();
    ctx.lineWidth = S*0.0045; ctx.strokeStyle = cssVar('--needle-edge'); ctx.stroke();

    // hub
    ctx.beginPath(); ctx.arc(cx,cy,S*0.028,0,7); ctx.fillStyle = cssVar('--hub-ring'); ctx.fill();
    ctx.beginPath(); ctx.arc(cx,cy,S*0.018,0,7); ctx.fillStyle = cssVar('--hub'); ctx.fill();

    // chip digital (desenhado por cima do ponteiro de propósito — nunca fica "colado")
    const chipW = S*0.24, chipH=S*0.075;
    const chipY = cy + S*0.19;
    ctx.fillStyle = tickColor;
    roundRect(ctx, cx-chipW/2, chipY, chipW, chipH, S*0.012);
    ctx.fill();
    // "fantasma" dos segmentos apagados (efeito visor LCD real)
    ctx.font = `bold ${Math.round(S*0.06)}px DSEG7, monospace`;
    ctx.fillStyle = 'rgba(245,245,240,0.12)';
    ctx.fillText('88.8', cx, chipY + chipH/2 + S*0.002);
    // valor real
    ctx.fillStyle = '#F5F5F0';
    ctx.fillText(value.toFixed(1), cx, chipY + chipH/2 + S*0.002);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function easeInOutQuad(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }

/* ============ instâncias ============ */
const gaugePressao = new Gauge(document.getElementById('gaugePressao'), GAUGE_CONFIGS.pressao);
const gaugeVazao    = new Gauge(document.getElementById('gaugeVazao'),   GAUGE_CONFIGS.vazao);
const gauges = [gaugePressao, gaugeVazao];

const STARTUP_TOTAL_MS = 3000; // 0 -> fundo de escala -> 0 em 3s no total
let liveConnected = false;
let anyDataReceived = false;

function setStatus(mode){
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot ' + (mode==='live' ? 'live' : mode==='off' ? 'off' : 'wait');
  txt.textContent = mode==='live' ? 'Ao vivo' : mode==='off' ? 'Desconectado' : mode==='startup' ? 'Iniciando' : 'Aguardando dados';
}

function frame(ts){
  gauges.forEach(g=>{
    if(g.mode === 'startup'){
      if(g.startTime === null) g.startTime = ts;
      const elapsed = ts - g.startTime;
      const half = STARTUP_TOTAL_MS/2;
      let raw;
      if(elapsed <= half){
        raw = easeInOutQuad(elapsed/half);                 // 0 -> 1 (sobe ate fundo de escala)
      } else if (elapsed <= STARTUP_TOTAL_MS){
        raw = 1 - easeInOutQuad((elapsed-half)/half);       // 1 -> 0 (desce ate zero)
      } else {
        raw = 0;
        g.mode = 'idle';
      }
      g.display = g.cfg.min + raw * (g.cfg.max - g.cfg.min);
      g.draw(g.display, 'AUTOTESTE');
    } else if (g.mode === 'idle'){
      g.display += (g.cfg.min - g.display) * 0.15;
      g.draw(g.display, anyDataReceived ? 'DESCONECTADO' : 'AGUARDANDO DADOS');
    } else { // live
      g.display += (g.target - g.display) * 0.25; // suavização — mantém fluidez mesmo com pacotes BLE espaçados
      g.draw(g.display, 'AO VIVO');
    }
  });
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
setStatus('startup');
setTimeout(()=>{ if(!liveConnected) setStatus('idle'); }, STARTUP_TOTAL_MS+50);

/* ============ Web Bluetooth ============ */
const connectBtn = document.getElementById('connectBtn');
let bleDevice = null;

async function connectBLE(){
  if(!navigator.bluetooth){
    alert('Web Bluetooth não disponível. Use Chrome no Android, via HTTPS.');
    return;
  }
  try{
    bleDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID]
    });
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
    const server = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const characteristic = await service.getCharacteristic(CHAR_UUID);
    await characteristic.startNotifications();
    characteristic.addEventListener('characteristicvaluechanged', onData);

    liveConnected = true;
    gauges.forEach(g=> g.mode = 'live');
    setStatus('live');
    connectBtn.textContent = 'Desconectar';
    connectBtn.classList.add('disconnect');
    connectBtn.onclick = disconnectBLE;
  }catch(err){
    console.error(err);
    if(err.name !== 'NotFoundError'){ alert('Falha ao conectar: ' + err.message); }
  }
}

function disconnectBLE(){
  if(bleDevice && bleDevice.gatt.connected){ bleDevice.gatt.disconnect(); }
}

function onDisconnected(){
  liveConnected = false;
  gauges.forEach(g=> g.mode = 'idle');
  setStatus('off');
  connectBtn.textContent = 'Conectar';
  connectBtn.classList.remove('disconnect');
  connectBtn.onclick = connectBLE;
}

function onData(event){
  anyDataReceived = true;
  const dv = event.target.value; // DataView
  const pressao = dv.getFloat32(0, true); // little-endian
  const vazao   = dv.getFloat32(4, true);
  gaugePressao.target = Math.max(gaugePressao.cfg.min, Math.min(gaugePressao.cfg.max, pressao));
  gaugeVazao.target    = Math.max(gaugeVazao.cfg.min,    Math.min(gaugeVazao.cfg.max, vazao));
}

connectBtn.onclick = connectBLE;

/* registra service worker (necessário para instalação como PWA) */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
